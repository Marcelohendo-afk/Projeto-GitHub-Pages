<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site GitHub Pages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Bem-vindo!</h1>

<script>
function mostrarMensagem(){
    document.getElementById("mensagem").innerHTML =
    "Parabéns! Seu site está funcionando!";
}
</script>

</body>
</html>
